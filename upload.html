<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати гру</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #00ffcc; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <form id="uploadForm">
        <h2>Додати нову гру</h2>
        <input type="text" id="title" placeholder="Назва гри" required>
        <input type="text" id="description" placeholder="Опис/Автор" required>
        <input type="text" id="image_url" placeholder="Посилання на картинку" required>
        <input type="text" id="game_url" placeholder="Посилання на гру" required>
        <button type="submit">ОПУБЛІКУВАТИ</button>
    </form>

    <script>
        const SUPABASE_URL = 'https://wiinnchnzekfftuvvbfs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpaW5uY2huemVrZmZ0dXZ2YmZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDQ0NzgsImV4cCI6MjA4Nzg4MDQ3OH0.QIMEgQcdYgUgrzndIVN58Bv5ERfVIwtXDyoO49-Z-Q8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const gameData = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image_url').value,
                game_url: document.getElementById('game_url').value
            };

            const { error } = await _supabase.from('games').insert([gameData]);

            if (error) alert('Помилка: ' + error.message);
            else {
                alert('Гру додано!');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
