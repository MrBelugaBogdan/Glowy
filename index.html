<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowy — Територія ігор</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #333; padding: 15px; border-radius: 10px; border: 2px solid #00ffcc; }
        .game-card img { width: 100%; border-radius: 5px; height: 150px; object-fit: cover; }
        .btn-play { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #00ffcc; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎮 Мої Ігри</h1>
    <div id="games-grid" class="games-grid">Завантаження...</div>

    <script>
        const SUPABASE_URL = 'https://wiinnchnzekfftuvvbfs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpaW5uY2huemVrZmZ0dXZ2YmZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDQ0NzgsImV4cCI6MjA4Nzg4MDQ3OH0.QIMEgQcdYgUgrzndIVN58Bv5ERfVIwtXDyoO49-Z-Q8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadGames() {
            const { data: games, error } = await _supabase
                .from('games')
                .select('title, description, image_url, game_url'); // Тільки твої поля

            const container = document.getElementById('games-grid');
            container.innerHTML = '';

            if (error) {
                console.error('Помилка:', error);
                container.innerHTML = 'Помилка завантаження бази даних.';
                return;
            }

            games.forEach(game => {
                container.innerHTML += `
                    <div class="game-card">
                        <img src="${game.image_url}" alt="${game.title}">
                        <h3>${game.title}</h3>
                        <p>${game.description}</p>
                        <a href="${game.game_url}" target="_blank" class="btn-play">ГРАТИ</a>
                    </div>
                `;
            });
        }
        loadGames();
    </script>
</body>
</html>
